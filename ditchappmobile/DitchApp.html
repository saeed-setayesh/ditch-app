<html lang="en">
<head>
<meta charset="utf-8" />

<style>
  :root{
    --on:#1FCB6B;        /* online green */
    --on-dark:#16A858;
    --cta:#3098F2;       /* primary blue CTA */
    --cta-dark:#1976D2;
    --ink:#0E1116;
    --ink-2:#3A4250;
    --ink-3:#7A8597;
    --ink-4:#B5BDC8;
    --line:#E6E9EE;
    --line-2:#F0F2F5;
    --paper:#FFFFFF;
    --bg:#F4F6F8;
    --bg-dark:#0B0E12;
    --surf-dark:#151920;
    --surf-dark-2:#1F242C;
    --line-dark:#262C36;
    /* incident colors */
    --i-accident:#F38A1F;
    --i-collision:#22B86C;
    --i-fire:#E63946;
    --i-hazard:#F4C430;
    --i-jam:#8C4FCF;
    --i-medical:#E63946;
    --i-police:#3098F2;
    --i-weather:#28C6C8;
    --i-construction:#FF7A33;
    --i-tow:#5C6BFF;
    /* map road colors */
    --road-fast:#4ADE80;
    --road-mid:#FACC15;
    --road-slow:#F97316;
    --road-stop:#EF4444;
  }
  html,body{margin:0;padding:0;background:#EDEFF2;font-family:'Inter',system-ui,sans-serif;color:var(--ink);}
  *{box-sizing:border-box;}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18);border-radius:99px}
</style>
</head>
